# Génère les certificats TLS pour la stack Wazuh
# Usage : docker compose -f generate-certs.yml run --rm generator
# Les certificats sont générés dans runtime/wazuh/certs/

services:
  generator:
    image: wazuh/wazuh-certs-generator:0.0.2
    hostname: wazuh-certs-generator
    container_name: wazuh-certs-generator
    volumes:
      - ./config.yml:/config/certs.yml:ro
      - ../../../runtime/wazuh/certs:/certificates
