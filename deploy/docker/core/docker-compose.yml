services:
  specula-backend:
    build:
      context: ../../..
      dockerfile: specula-core/Dockerfile
    working_dir: /app/specula-core
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    labels:
      - "specula.service=backend"
      - "specula.api=http://localhost:8000"
      - "specula.docs=http://localhost:8000/docs"
      - "specula.redoc=http://localhost:8000/redoc"
    volumes:
      - ../../../specula-core:/app/specula-core
      - ../../../requirements.txt:/app/requirements.txt:ro
      - ../../../.env:/app/.env:ro
      - ../../../runtime/logs/suricata:/var/log/suricata:ro
    env_file:
      - ../../../.env
    environment:
      SPECULA_API_BASE_URL: http://localhost:8000
      SPECULA_SURICATA_EVE_PATH: /var/log/suricata/eve.json
    restart: unless-stopped
    depends_on:
      specula-suricata:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - specula-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/docs')"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  specula-frontend:
    build:
      context: ../../../specula-console
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    labels:
      - "specula.service=frontend"
      - "specula.console=http://localhost:5173"
    volumes:
      - ../../../specula-console:/app
      - /app/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      specula-backend:
        condition: service_healthy
    command:
      - npm
      - run
      - dev
      - --
      - --host
      - 0.0.0.0
    restart: unless-stopped
    networks:
      - specula-net
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:5173"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  specula-suricata:
    image: jasonish/suricata:latest
    network_mode: host
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_NICE
    environment:
      TZ: ${TZ:-Europe/Paris}
    command:
      - -i
      - ${SURICATA_INTERFACE:-enx00e04c394310}
      - -c
      - /etc/suricata/suricata.yaml
    volumes:
      - ./suricata/etc:/etc/suricata
      - ./suricata/rules:/var/lib/suricata/rules
      - ../../../runtime/logs/suricata:/var/log/suricata

networks:
  specula-net:
    external: true
    name: specula-net
